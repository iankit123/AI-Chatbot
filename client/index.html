  <head>
    <meta charset="UTF-8" />

    <title>Saathi - Your Perfect Virtual Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

      body {
        font-family: 'Poppins', sans-serif;
      }
      /* Only hide overflow in chat page, not on landing page */
      .chat-page {
        height: 100vh;
        overflow: hidden;
      }
      .chat-area::-webkit-scrollbar {
        width: 6px;
      }
      .chat-area::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .chat-area::-webkit-scrollbar-thumb {
        background: #d1d1d1;
        border-radius: 10px;
      }
    </style>
