[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  # Do not commit API keys here. In Netlify: Site settings → Environment variables, set at least:
  # OPENROUTER_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

# Supabase-backed persistence (Express has these on dev; Netlify needs explicit routes
# because /api/chat/messages would otherwise map to a non-existent function "chat/messages".)
[[redirects]]
  from = "/api/chat/messages"
  to = "/.netlify/functions/chat-messages"
  status = 200

[[redirects]]
  from = "/api/chat/conversations"
  to = "/.netlify/functions/chat-conversations"
  status = 200

[[redirects]]
  from = "/api/billing/payment-attempt"
  to = "/.netlify/functions/billing-payment-attempt"
  status = 200

[[redirects]]
  from = "/api/profiles/upsert"
  to = "/.netlify/functions/profiles-upsert"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 